<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra | Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f97316; --bg: #030303; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #262626 0%, #030303 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        /* Estilo Glassmorphism Refinado */
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .glass:hover {
            border-color: rgba(249, 115, 22, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.2);
        }

        .btn-primary:active { transform: scale(0.98); }

        /* Scrollbar Estilizada */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(249, 115, 22, 0.3); border-radius: 10px; }

        /* Animação de Entrada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: slideUp 0.4s ease-out forwards; }

        /* Fix para Select no iOS/Android */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col items-center mb-12 animate-card">
            <h1 class="text-5xl md:text-6xl logo-font font-extrabold tracking-tighter italic italic">
                IRON<span class="text-orange-500">TRACK</span>
            </h1>
            <div class="flex items-center gap-3 mt-2">
                <span class="h-px w-8 bg-orange-500/50"></span>
                <p class="text-[10px] text-gray-400 uppercase tracking-[0.6em] font-bold">Ultra Edition</p>
                <span class="h-px w-8 bg-orange-500/50"></span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-[2rem] flex flex-col justify-center">
                        <span class="text-[10px] font-bold text-gray-500 uppercase mb-1">Status</span>
                        <p id="weeklyStats" class="text-xl font-bold italic text-orange-500">0/0</p>
                    </div>
                    <div class="glass p-5 rounded-[2rem] flex items-center justify-between">
                        <div>
                            <span class="text-[10px] font-bold text-gray-500 uppercase mb-1">Meta</span>
                            <p id="todayProgress" class="text-xl font-bold italic">0%</p>
                        </div>
                        <svg class="w-10 h-10 -rotate-90">
                            <circle cx="20" cy="20" r="16" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="none"/>
                            <circle id="progressCircle" cx="20" cy="20" r="16" stroke="#f97316" stroke-width="4" fill="none" 
                                    stroke-dasharray="100.5" stroke-dashoffset="100.5" stroke-linecap="round" class="transition-all duration-500"/>
                        </svg>
                    </div>
                </div>

                <div id="restTimerDisplay" class="glass p-6 rounded-[2rem] hidden border-orange-500/40 bg-orange-500/5">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest">Descanso</p>
                            <p id="timerClock" class="text-3xl font-black italic">00:00</p>
                        </div>
                        <button onclick="stopTimer()" class="h-12 w-12 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center font-bold">✕</button>
                    </div>
                </div>

                <section class="glass p-8 rounded-[2.5rem] sticky top-8">
                    <h2 class="text-xs font-black uppercase text-orange-500 mb-6 tracking-widest">Nova Sessão</h2>
                    <div class="space-y-4">
                        <div class="relative">
                            <select id="daySelect" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow font-bold text-sm cursor-pointer appearance-none">
                                <option value="SEG">Segunda-feira</option>
                                <option value="TER">Terça-feira</option>
                                <option value="QUA">Quarta-feira</option>
                                <option value="QUI">Quinta-feira</option>
                                <option value="SEX">Sexta-feira</option>
                                <option value="SAB">Sábado</option>
                                <option value="DOM">Domingo</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-500">▼</div>
                        </div>
                        <input type="text" id="workoutInput" placeholder="Nome do treino (Ex: Upper Body)" 
                               class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow font-medium text-sm">
                        
                        <button onclick="addWorkout()" class="btn-primary w-full text-black font-black py-4 rounded-2xl uppercase text-xs tracking-[0.2em]">
                            Confirmar Treino
                        </button>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-2">
                <div id="workoutList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass w-full max-w-lg rounded-[3rem] overflow-hidden animate-card relative z-10 border-white/10">
            <div class="p-8">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <span id="modalDay" class="text-[10px] font-black text-orange-500 uppercase tracking-widest"></span>
                        <h3 id="modalTitle" class="text-3xl font-bold italic logo-font leading-tight"></h3>
                    </div>
                    <button onclick="closeModal()" class="h-12 w-12 glass rounded-2xl flex items-center justify-center text-2xl">&times;</button>
                </div>

                <div class="flex gap-2 mb-6">
                    <input type="text" id="exerciseInput" placeholder="Adicionar: Agachamento 3x12" 
                           class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow text-sm">
                    <button onclick="addExercise()" class="btn-primary text-black w-14 rounded-2xl font-bold text-2xl">+</button>
                </div>

                <div id="exerciseList" class="max-h-[40vh] overflow-y-auto space-y-3 pr-2 custom-scroll">
                    </div>

                <div class="mt-8 pt-6 border-t border-white/5 flex flex-wrap justify-center gap-3">
                    <button onclick="startTimer(30)" class="px-5 py-2 rounded-xl glass text-[10px] font-bold uppercase hover:bg-orange-500 hover:text-black transition-all">30s Rest</button>
                    <button onclick="startTimer(60)" class="px-5 py-2 rounded-xl glass text-[10px] font-bold uppercase hover:bg-orange-500 hover:text-black transition-all">60s Rest</button>
                    <button onclick="startTimer(90)" class="px-5 py-2 rounded-xl glass text-[10px] font-bold uppercase hover:bg-orange-500 hover:text-black transition-all">90s Rest</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let workouts = JSON.parse(localStorage.getItem('ironTrackUltra_v3')) || [];
        let activeWorkoutId = null;
        let timerInterval;

        function addWorkout() {
            const day = document.getElementById('daySelect').value;
            const title = document.getElementById('workoutInput').value;
            if (!title) return;
            workouts.push({ id: Date.now(), day, title, done: false, exercises: [] });
            save();
            document.getElementById('workoutInput').value = "";
        }

        function toggleWorkoutStatus(id, e) {
            e.stopPropagation();
            workouts = workouts.map(w => w.id === id ? {...w, done: !w.done} : w);
            save();
        }

        function openModal(id) {
            activeWorkoutId = id;
            const workout = workouts.find(w => w.id === id);
            document.getElementById('modalTitle').innerText = workout.title;
            document.getElementById('modalDay').innerText = workout.day;
            document.getElementById('modal').classList.remove('hidden');
            renderExercises();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            activeWorkoutId = null;
        }

        function addExercise() {
            const input = document.getElementById('exerciseInput');
            if (!input.value) return;
            workouts.forEach(w => {
                if(w.id === activeWorkoutId) w.exercises.push({ id: Date.now(), name: input.value, completed: false });
            });
            input.value = "";
            save();
            renderExercises();
        }

        function toggleExercise(exId) {
            workouts.forEach(w => {
                if(w.id === activeWorkoutId) {
                    w.exercises.forEach(ex => { if(ex.id === exId) ex.completed = !ex.completed; });
                }
            });
            save();
            renderExercises();
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            document.getElementById('restTimerDisplay').classList.remove('hidden');
            let timeLeft = seconds;
            const display = document.getElementById('timerClock');
            
            const updateUI = () => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            updateUI();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    navigator.vibrate ? navigator.vibrate(200) : null;
                    document.getElementById('restTimerDisplay').classList.add('hidden');
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('restTimerDisplay').classList.add('hidden');
        }

        function deleteWorkout(id, e) {
            e.stopPropagation();
            if(confirm("Deseja remover este treino?")) {
                workouts = workouts.filter(w => w.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('ironTrackUltra_v3', JSON.stringify(workouts));
            render();
            updateStats();
        }

        function updateStats() {
            const total = workouts.length;
            const done = workouts.filter(w => w.done).length;
            document.getElementById('weeklyStats').innerText = `${done}/${total}`;
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('todayProgress').innerText = `${pct}%`;
            document.getElementById('progressCircle').style.strokeDashoffset = 100.5 - (pct / 100 * 100.5);
        }

        function renderExercises() {
            const container = document.getElementById('exerciseList');
            const workout = workouts.find(w => w.id === activeWorkoutId);
            container.innerHTML = workout.exercises.map(ex => `
                <div onclick="toggleExercise(${ex.id})" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-all border border-white/5">
                    <span class="text-sm font-semibold ${ex.completed ? 'opacity-20 line-through' : ''}">${ex.name}</span>
                    <div class="w-6 h-6 rounded-lg border-2 border-orange-500/50 flex items-center justify-center ${ex.completed ? 'bg-orange-500 border-orange-500' : ''}">
                        ${ex.completed ? '<span class="text-black font-bold text-xs">✓</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function render() {
            const list = document.getElementById('workoutList');
            if (workouts.length === 0) {
                list.innerHTML = `<div class="col-span-full py-20 text-center opacity-20 font-bold uppercase tracking-widest">Nenhum treino agendado</div>`;
                return;
            }
            list.innerHTML = workouts.slice().reverse().map(w => `
                <div onclick="openModal(${w.id})" class="glass rounded-[2rem] p-6 flex flex-col justify-between cursor-pointer border-l-4 ${w.done ? 'border-green-500' : 'border-orange-500'} animate-card">
                    <div class="mb-6">
                        <span class="text-[9px] font-black px-2 py-1 rounded-lg bg-orange-500/10 text-orange-500 uppercase tracking-tighter border border-orange-500/20">${w.day}</span>
                        <h3 class="text-2xl font-bold italic uppercase tracking-tighter mt-3 leading-tight ${w.done ? 'line-through opacity-40' : ''}">${w.title}</h3>
                        <p class="text-[10px] text-gray-500 font-bold mt-1 uppercase tracking-widest">${w.exercises.length} Movimentos</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleWorkoutStatus(${w.id}, event)" class="flex-1 h-12 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all ${w.done ? 'bg-green-500 text-black' : 'bg-white/5 text-gray-400 border border-white/10 hover:border-orange-500/50'}">
                            ${w.done ? 'Concluído' : 'Finalizar'}
                        </button>
                        <button onclick="deleteWorkout(${w.id}, event)" class="w-12 h-12 rounded-2xl bg-white/5 text-gray-700 flex items-center justify-center hover:text-red-500 transition-colors">✕</button>
                    </div>
                </div>
            `).join('');
        }

        render();
        updateStats();
    </script>
</body>
</html>
