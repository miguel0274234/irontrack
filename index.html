<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronTrack Ultra | Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f97316; --bg: #030303; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #030303 80%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .orange-glow:focus { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.3); border-color: var(--primary); }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        /* Fix para o fundo do Select */
        select option { background-color: #1a1a1a; color: white; }
        
        @keyframes pulse-border {
            0% { border-color: rgba(249, 115, 22, 0.2); }
            50% { border-color: rgba(249, 115, 22, 0.6); }
            100% { border-color: rgba(249, 115, 22, 0.2); }
        }
        .active-timer { animation: pulse-border 2s infinite; border-width: 2px; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="max-w-md mx-auto">
        <header class="flex justify-center items-center mb-10 pt-8">
            <div class="text-center">
                <h1 class="text-4xl logo-font font-bold text-white tracking-tighter italic">IRON<span class="text-orange-500">TRACK</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.5em] font-bold">Limitless Performance</p>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Concluídos</p>
                <p class="text-xl font-bold italic" id="weeklyStats text-orange-500">0 Treinos</p>
            </div>
            <div class="glass p-4 rounded-3xl flex items-center justify-between">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Meta Global</p>
                    <p class="text-xl font-bold italic" id="todayProgress text-white">0%</p>
                </div>
                <div class="relative w-10 h-10">
                    <svg class="w-full h-full progress-ring">
                        <circle cx="20" cy="20" r="18" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent"/>
                        <circle id="progressCircle" cx="20" cy="20" r="18" stroke="#f97316" stroke-width="4" fill="transparent" stroke-dasharray="113.1" stroke-dashoffset="113.1" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        </div>

        <div id="restTimerDisplay" class="glass mb-8 p-4 rounded-3xl hidden border-orange-500/30">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold text-orange-500 uppercase">Descanso Ativo</span>
                <span id="timerClock" class="text-2xl font-black text-white italic">00:45</span>
                <button onclick="stopTimer()" class="text-xs font-bold text-red-500 uppercase">Parar</button>
            </div>
        </div>

        <section class="glass p-6 rounded-[2.5rem] mb-10">
            <h2 class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-widest">Agendar Novo Treino</h2>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <select id="daySelect" class="bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow text-sm font-semibold cursor-pointer">
                        <option value="SEG">Segunda</option>
                        <option value="TER">Terça</option>
                        <option value="QUA">Quarta</option>
                        <option value="QUI">Quinta</option>
                        <option value="SEX">Sexta</option>
                        <option value="SAB">Sábado</option>
                        <option value="DOM">Domingo</option>
                    </select>
                    <input type="text" id="workoutInput" placeholder="Ex: Peito e Tríceps" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow font-medium">
                </div>
                <button onclick="addWorkout()" class="btn-primary w-full text-black font-black py-4 rounded-2xl uppercase text-xs tracking-widest shadow-lg shadow-orange-950/20">
                    Criar Treino
                </button>
            </div>
        </section>

        <div id="workoutList" class="space-y-4 pb-10"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="glass w-full max-w-sm rounded-[3rem] p-8 animate-in relative z-10 border-white/10">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modalTitle" class="text-3xl font-bold text-white italic logo-font uppercase">TREINO</h3>
                    <p id="modalDay" class="text-[10px] text-orange-500 font-black uppercase tracking-widest"></p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 text-3xl">&times;</button>
            </div>

            <div class="flex gap-2 mb-8">
                <input type="text" id="exerciseInput" placeholder="Ex: Supino 4x10" class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none orange-glow text-sm">
                <button onclick="addExercise()" class="bg-white text-black px-5 rounded-2xl font-black text-xl">+</button>
            </div>

            <div id="exerciseList" class="max-h-[35vh] overflow-y-auto space-y-3 pr-2"></div>

            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase mb-3 text-center">Iniciar Descanso</p>
                <div class="flex justify-center gap-3">
                    <button onclick="startTimer(30)" class="px-4 py-2 rounded-xl border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black transition-all">30s</button>
                    <button onclick="startTimer(60)" class="px-4 py-2 rounded-xl border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black transition-all">60s</button>
                    <button onclick="startTimer(90)" class="px-4 py-2 rounded-xl border border-white/10 text-xs font-bold hover:bg-orange-500 hover:text-black transition-all">90s</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let workouts = JSON.parse(localStorage.getItem('ironTrackUltra_v2')) || [];
        let activeWorkoutId = null;
        let timerInterval;

        function addWorkout() {
            const day = document.getElementById('daySelect').value;
            const title = document.getElementById('workoutInput').value;
            if (!title) return;

            workouts.push({ id: Date.now(), day, title, done: false, exercises: [] });
            save();
            document.getElementById('workoutInput').value = "";
        }

        function toggleWorkoutStatus(id, e) {
            e.stopPropagation();
            workouts = workouts.map(w => w.id === id ? {...w, done: !w.done} : w);
            save();
        }

        function openModal(id) {
            activeWorkoutId = id;
            const workout = workouts.find(w => w.id === id);
            document.getElementById('modalTitle').innerText = workout.title;
            document.getElementById('modalDay').innerText = workout.day;
            document.getElementById('modal').classList.remove('hidden');
            renderExercises();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            activeWorkoutId = null;
        }

        function addExercise() {
            const input = document.getElementById('exerciseInput');
            if (!input.value) return;
            workouts.map(w => {
                if(w.id === activeWorkoutId) w.exercises.push({ id: Date.now(), name: input.value, completed: false });
            });
            input.value = "";
            save();
            renderExercises();
        }

        function toggleExercise(exId) {
            workouts.map(w => {
                if(w.id === activeWorkoutId) {
                    w.exercises.map(ex => {
                        if(ex.id === exId) ex.completed = !ex.completed;
                    });
                }
            });
            save();
            renderExercises();
        }

        function startTimer(seconds) {
            clearInterval(timerInterval);
            document.getElementById('restTimerDisplay').classList.remove('hidden');
            let timeLeft = seconds;
            
            const updateUI = () => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timerClock').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            updateUI();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Descanso finalizado! Próxima série.");
                    document.getElementById('restTimerDisplay').classList.add('hidden');
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('restTimerDisplay').classList.add('hidden');
        }

        function deleteWorkout(id, e) {
            e.stopPropagation();
            if(confirm("Excluir este treino?")) {
                workouts = workouts.filter(w => w.id !== id);
                save();
            }
        }

        function save() {
            localStorage.setItem('ironTrackUltra_v2', JSON.stringify(workouts));
            render();
            updateStats();
        }

        function updateStats() {
            const total = workouts.length;
            const done = workouts.filter(w => w.done).length;
            document.getElementById('weeklyStats').innerText = `${done}/${total} Treinos`;
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('todayProgress').innerText = `${pct}%`;
            document.getElementById('progressCircle').style.strokeDashoffset = 113.1 - (pct / 100 * 113.1);
        }

        function renderExercises() {
            const container = document.getElementById('exerciseList');
            const workout = workouts.find(w => w.id === activeWorkoutId);
            container.innerHTML = workout.exercises.map(ex => `
                <div onclick="toggleExercise(${ex.id})" class="flex items-center justify-between p-4 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition-all border border-white/5">
                    <span class="text-sm font-medium ${ex.completed ? 'opacity-30 line-through' : ''}">${ex.name}</span>
                    <div class="w-6 h-6 rounded-lg border-2 border-orange-500 flex items-center justify-center ${ex.completed ? 'bg-orange-500' : ''}">
                        ${ex.completed ? '✓' : ''}
                    </div>
                </div>
            `).join('');
        }

        function render() {
            const list = document.getElementById('workoutList');
            if (workouts.length === 0) {
                list.innerHTML = `<p class="text-center py-20 opacity-20 font-bold uppercase tracking-widest">Nenhum treino agendado</p>`;
                return;
            }
            list.innerHTML = workouts.slice().reverse().map(w => `
                <div onclick="openModal(${w.id})" class="glass rounded-[2rem] p-5 flex items-center justify-between cursor-pointer border-l-4 ${w.done ? 'border-green-500 opacity-50' : 'border-orange-500'}">
                    <div>
                        <span class="text-[9px] font-black px-2 py-0.5 rounded bg-white/10 text-orange-500 uppercase">${w.day}</span>
                        <h3 class="text-xl font-bold italic uppercase tracking-tighter mt-1">${w.title}</h3>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">${w.exercises.length} Exercícios</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleWorkoutStatus(${w.id}, event)" class="h-10 w-10 rounded-xl flex items-center justify-center ${w.done ? 'bg-green-500 text-black' : 'bg-white/5 text-gray-500 border border-white/10'}">✓</button>
                        <button onclick="deleteWorkout(${w.id}, event)" class="h-10 w-10 rounded-xl bg-white/5 text-gray-700 flex items-center justify-center hover:text-red-500 transition-colors">✕</button>
                    </div>
                </div>
            `).join('');
        }

        render();
        updateStats();
    </script>
</body>
</html>
